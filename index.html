<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Perfil Interativo</title>

<style>
:root {
  --bg-dark: #05070f;
  --bg-mid: #150a14;
  --card: rgba(30, 8, 15, 0.98);
  --text: #f8f2ef;
  --muted: #d8b7bb;
  --accent: #ff4450;
  --accent-soft: rgba(255, 68, 80, 0.18);
  --glow: rgba(255, 68, 80, 0.35);
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  min-height: 100vh;
  font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
  background: #07060e;
  color: var(--text);
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 24px;
  overflow: hidden;
  position: relative;
}

/* GIF background as element for better scaling control */
.bg-gif { position: fixed; inset: 0; z-index: -2; overflow: hidden; }
.bg-gif img { width: 100%; height: 100%; object-fit: cover; transform: translateZ(0); will-change: transform; filter: saturate(1.05) contrast(0.95); }
.bg-overlay { position: fixed; inset: 0; z-index: -1; background: linear-gradient(rgba(4,6,10,0.55), rgba(6,4,8,0.55)); }

body::before, body::after {
  content: ''; position: absolute; inset: 0; background: radial-gradient(circle, rgba(255,255,255,0.18) 1px, transparent 1px); background-size: 40px 40px; opacity: 0.25; pointer-events: none;
}
body::before { transform: translateZ(0); animation: drift 25s linear infinite; }
body::after { background-size: 90px 90px; opacity: 0.12; animation: drift 40s linear reverse infinite; }

@keyframes drift { from { transform: translate(0,0); } to { transform: translate(-120px,140px); } }

@keyframes pulseGlow { 0%,100%{ box-shadow: 0 0 28px rgba(255,68,80,0.18);} 50%{ box-shadow: 0 0 48px rgba(255,68,80,0.28);} }

.profile {
  position: relative;
  width: min(620px, calc(100% - 32px));
  /* semi-transparent background so the GIF shows through */
  background: rgba(8,8,10,0.45);
  backdrop-filter: blur(8px) saturate(1.05);
  -webkit-backdrop-filter: blur(8px) saturate(1.05);
  border: 1px solid rgba(255,255,255,0.06);
  border-radius: 32px;
  padding: 42px 34px;
  box-shadow: 0 18px 40px rgba(0,0,0,0.6), inset 0 0 18px rgba(255,255,255,0.02);
  overflow: hidden;
}

.profile::before {
  content: '';
  position: absolute;
  inset: 0;
  background: radial-gradient(circle at top right, rgba(255, 81, 94, 0.18), transparent 25%),
              radial-gradient(circle at 20% 80%, rgba(255, 255, 255, 0.08), transparent 20%);
  pointer-events: none;
}

.avatar {
  width: 140px;
  height: 140px;
  margin: 0 auto;
  border-radius: 999px;
  padding: 6px;
  position: relative;
  background: transparent;
  box-shadow: 0 8px 24px rgba(0,0,0,0.6);
}

.avatar img {
  width: 100%;
  height: 100%;
  border-radius: 999px;
  object-fit: cover;
  display: block;
  position: relative;
  z-index: 2;
}

/* Animated ring around avatar */
.avatar::before {
  content: '';
  position: absolute;
  left: -6px;
  top: -6px;
  right: -6px;
  bottom: -6px;
  border-radius: 999px;
  /* gold-only rotating ring, slower */
  background: conic-gradient(from 0deg, #ffd700, #fff1a8, #f5c400, #ffd700);
  filter: blur(6px) saturate(1.05);
  opacity: 0.95;
  z-index: 0;
  animation: ringSpin 12s linear infinite;
}

.avatar::after {
  content: '';
  position: absolute;
  left: 2px;
  top: 2px;
  right: 2px;
  bottom: 2px;
  border-radius: 999px;
  background: rgba(0,0,0,0.12);
  z-index: 1;
}

@keyframes ringSpin {
  from { transform: rotate(0deg); }
  to { transform: rotate(360deg); }
}

.profile h1 {
  text-align: center;
  margin-top: 22px;
  font-size: clamp(2.4rem, 4vw, 3rem);
  letter-spacing: -0.08em;
}



.tagline {
  text-align: center;
  margin-top: 10px;
  color: var(--muted);
  font-size: 0.95rem;
  letter-spacing: 0.08em;
  text-transform: uppercase;
}

.description {
  text-align: center;
  margin-top: 8px;
  color: rgba(216,183,187,0.95);
  font-size: 0.95rem;
  max-width: 520px;
  margin-left: auto;
  margin-right: auto;
  opacity: 1;
  transform: none;
  animation: none;
}

.description::after {
  content: '';
  display: block;
  width: 44px;
  height: 3px;
  margin: 8px auto 0;
  border-radius: 3px;
  background: linear-gradient(90deg, rgba(255,215,0,0.85), rgba(255,68,80,0.9));
  opacity: 0.85;
  animation: none;
}

@keyframes descReveal {
  to { opacity: 1; transform: translateY(0); }
}

@keyframes pulseLine {
  0% { transform: scaleX(0.9); opacity: 0.25; }
  50% { transform: scaleX(1.05); opacity: 1; }
  100% { transform: scaleX(0.9); opacity: 0.25; }
}

.role-text {
  margin: 28px auto 0;
  display: flex;
  align-items: center;
  justify-content: center;
  width: 340px;
  height: 46px;
}

.input {
  font-size: 1.15rem;
  font-weight: 600;
  color: #ffe5e8;
  letter-spacing: 0.02em;
  display: inline-block;
  white-space: nowrap;
  min-height: 1.4em;
  line-height: 1.2;
}

.typed-cursor {
  font-size: 1.15rem;
  color: rgba(255, 255, 255, 0.75);
  opacity: 1;
  animation: blink 0.8s steps(1) infinite;
}

@keyframes blink {
  0%, 50% { opacity: 1; }
  51%, 100% { opacity: 0; }
}

.divider {
  height: 1px;
  background: linear-gradient(90deg, transparent, rgba(255, 68, 80, 0.35), transparent);
  margin: 32px 0;
}

.info {
  display: grid;
  gap: 16px;
  font-size: 1rem;
  line-height: 1.7;
}

.info div {
  display: flex;
  justify-content: space-between;
  align-items: center;
  gap: 12px;
}

.info span:first-child {
  color: var(--muted);
}

.info strong {
  color: #fff;
}

.skills {
  display: flex;
  flex-wrap: wrap;
  gap: 12px;
  margin-top: 18px;
  justify-content: center;
}

.skill {
  background: rgba(255, 68, 80, 0.12);
  color: #ffd7dc;
  padding: 10px 16px;
  border-radius: 999px;
  font-size: 0.95rem;
  border: 1px solid rgba(255, 68, 80, 0.18);
}

.flag {
  display: inline-block;
  vertical-align: middle;
  margin-left: 2px;
  width: 50px;
  height: 32px;
  object-fit: contain;
  animation: flagWave 1.2s ease-in-out infinite;
}

@keyframes flagWave {
  0%, 100% { transform: translateY(0) rotate(0deg); }
  25% { transform: translateY(-1px) rotate(2deg); }
  50% { transform: translateY(0) rotate(0deg); }
  75% { transform: translateY(-1px) rotate(-2deg); }
}

@media (max-width: 540px) {
  .profile {
    padding: 30px 22px;
  }

  .avatar {
    width: 124px;
    height: 124px;
  }
}
</style>
</head>

<body>
<div class="bg-gif" aria-hidden="true">
  <img src="https://xatimg.com/image/C7BEdFRkVNGn.png" alt="background image">
</div>
<div class="bg-overlay" aria-hidden="true"></div>
<div class="profile">
  <div class="avatar">
    <img src="https://xatimg.com/image/91aP4Zn1Vfgr.jpg" alt="Avatar" />
  </div>

  <h1>Hz</h1>
  <div class="tagline">Trade days and powers</div>
  <div class="description">Interested in buying a responsive xatspace, contact me.</div>

  <div class="role-text">
    <span class="input">SOC Analyst</span>
  </div>

  <div class="divider"></div>

  <div class="info">
    <div><span>Regname</span><strong>Harryz</strong></div>
    <div><span>Location</span><strong><img class="flag" src="flag" alt="Bandeira do Brasil"> </strong></div>
  </div>

  <!-- skills removed as requested -->
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/typed.js/2.0.10/typed.min.js"></script>
<script>
  new Typed('.input', {
    strings: [
      'SOC Analyst',
      'Pentester',
      'Network Infrastructure',
      'Java Developer'
    ],
    typeSpeed: 70,
    backSpeed: 55,
    startDelay: 200,
    backDelay: 1000,
    smartBackspace: false,
    loop: true,
    showCursor: true,
    cursorChar: '|'
  });
</script>


</body>
</html>
